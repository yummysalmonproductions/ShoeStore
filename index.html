<body>
<div id="app"></div>
<script>
/* ============================================================
   SNEAKER HEAD BOSS BASIC
   ============================================================ */
const GAME_TITLE = "Sneaker Head Boss Basic";
const RENT = 30;
const AD_COST = 15;

const BRANDS = [
  { id:"classic", name:"Classic Kicks", short:"Classic",
    cost:15, minPrice:20, maxPrice:50, defaultPrice:30, priceStep:5,
    basePopularity:0.55, bulkChance:0.25, unlockLevel:1, color:"#FF6B35" },
  { id:"zenith",  name:"Zenith Court",  short:"Zenith",
    cost:35, minPrice:40, maxPrice:80, defaultPrice:55, priceStep:5,
    basePopularity:0.35, bulkChance:0.15, unlockLevel:2, color:"#5B8DEF" },
  { id:"phantom", name:"Phantom Fly",   short:"Phantom",
    cost:65, minPrice:70, maxPrice:140, defaultPrice:95, priceStep:10,
    basePopularity:0.20, bulkChance:0.08, unlockLevel:3, color:"#9C6BFF" },
];

const CUSTOM_COLORS = ["#FF6B35","#5B8DEF","#9C6BFF","#4CAF50","#E2588A","#FFD166","#2D2A26","#00BCD4","#FF4757","#1B5E20"];

function defaultCustomBrand() {
  return { id:"custom", name:"My Design", short:"My Design",
    cost:15, minPrice:20, maxPrice:50, defaultPrice:30, priceStep:5,
    basePopularity:0.25, bulkChance:0.2, unlockLevel:1,
    color:"#FF6B35", accentColor:"#FFFFFF", designed:false };
}

function SHOE_SVG(color, acc) {
  const a = acc||"#fff";
  return `<span class="shoe-icon"><svg width="30" height="15" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
    <path d="M6,21 Q9,14 24,10.5 Q38,8 50,8 Q66,8 78,11 Q90,14 95,21 Q98,25 95,29 Q90,36 78,39 Q66,42 50,42 Q38,42 24,39.5 Q9,36 6,29 Q3,25 6,21 Z" fill="${color}" stroke="#2D2A26" stroke-width="1.2"/>
    <path d="M6,21 Q9,14 24,10.5 Q19,18 19,25 Q19,32 24,39.5 Q9,36 6,29 Q3,25 6,21 Z" fill="#000" opacity="0.16"/>
    <rect x="44" y="9" width="13" height="32" rx="6.5" fill="${a}" opacity="0.92"/>
    <line x1="42" y1="15" x2="59" y2="19" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <line x1="59" y1="15" x2="42" y2="19" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <line x1="42" y1="23" x2="59" y2="27" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <line x1="59" y1="23" x2="42" y2="27" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <line x1="42" y1="31" x2="59" y2="35" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <line x1="59" y1="31" x2="42" y2="35" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <path d="M95,21 Q98,25 95,29 Q90,36 78,39 Q84,32 84,25 Q84,18 78,11 Q90,14 95,21 Z" fill="#000" opacity="0.12"/>
  </svg></span>`;
}

/* ============================================================ STATE */
function freshState() {
  const inventory={}, stagedBuy={}, stagedPrices={}, adsByBrand={};
  BRANDS.forEach(b => {
    inventory[b.id]={units:0,costEach:0}; stagedBuy[b.id]=0;
    stagedPrices[b.id]=b.defaultPrice; adsByBrand[b.id]=false;
  });
  const cb = defaultCustomBrand();
  inventory[cb.id]={units:0,costEach:0}; stagedBuy[cb.id]=0;
  stagedPrices[cb.id]=cb.defaultPrice; adsByBrand[cb.id]=false;
  return {
    screen:"intro", playerName:"",
    day:1, level:1, cash:100,
    inventory, shelfOwned:false,
    history:[], badges:[],
    staged:{ buy:stagedBuy, prices:stagedPrices, payRent:true, adsByBrand, loanRepay:0 },
    currentDay:null, currentQuiz:null,
    customBrand:cb, designDraftName:null, cameFrom:null,
    message:null, activeTab:"income",
    missedRentStreak:0, loan:0,
    competition:{ active:false, startDay:null, strength:0, profitStreak:0 },
    investStep:0, investCalc:null,
  };
}
let state = freshState();

const fmt = n => { const neg=n<0; return (neg?"-$":"$")+Math.round(Math.abs(n)).toLocaleString(); };
const getStoreName = () => state.playerName ? `${state.playerName}'s Shoe Store` : "My Shoe Store";

/* ============================================================ HELPERS */
const findBrand    = id => (state.customBrand&&id===state.customBrand.id) ? state.customBrand : BRANDS.find(b=>b.id===id)||null;
const unlockedBrands = () => { const l=BRANDS.filter(b=>b.unlockLevel<=state.level); if(state.customBrand&&state.customBrand.designed)l.push(state.customBrand); return l; };
const totalUnits   = () => Object.values(state.inventory).reduce((s,v)=>s+v.units,0);
const inventoryValueNow = () => Object.keys(state.inventory).reduce((s,id)=>s+state.inventory[id].units*state.inventory[id].costEach,0);
const totalStagedCost = (excl) => unlockedBrands().reduce((s,b)=>s+(b.id===excl?0:(state.staged.buy[b.id]||0))*b.cost,0);
const totalAdSpend    = () => state.level<2 ? 0 : unlockedBrands().filter(b=>!!(state.staged.adsByBrand&&state.staged.adsByBrand[b.id])).length*AD_COST;
function maxBuyable(brand) {
  const bills = (state.level>=2&&state.staged.payRent?RENT:0)+totalAdSpend();
  const available = state.cash - totalStagedCost(brand.id) - bills - (state.staged.loanRepay||0);
  return Math.max(0, Math.floor(available / brand.cost));
}
const totalShelfIfOpened = () => unlockedBrands().reduce((s,b)=>s+state.inventory[b.id].units+(state.staged.buy[b.id]||0),0);

/* ============================================================ DAILY POPULARITY */
function computeDailyPopularity(ub, adsByBrand) {
  const popularity={}, adBoostPct={};
  ub.forEach(b => {
    const base = b.basePopularity;
    const drift = 0.80 + Math.random()*0.50;          // natural ±25% daily shift
    let pop = base * drift;
    adBoostPct[b.id] = 0;
    if (adsByBrand&&adsByBrand[b.id]) {
      const eff = 0.4 + Math.random()*1.6;             // ad effectiveness 0.4–2.0×
      const boost = base*0.5*eff;
      adBoostPct[b.id] = boost/base;
      pop += boost;
    }
    // Competition steals some demand too
    if (state.competition.active) pop *= (1 - state.competition.strength*0.3);
    popularity[b.id] = Math.max(pop, base*0.10);
  });
  return { popularity, adBoostPct };
}

/* ============================================================ STOREFRONT */
function shelfIconsHTML(getUnits) {
  const ub=unlockedBrands(); const total=ub.reduce((s,b)=>s+getUnits(b),0);
  if(!total) return `<span class="empty-shelf">Empty — buy some sneakers!</span>`;
  const cap=8;
  return ub.map(b=>{ const u=getUnits(b); if(!u) return "";

  }).join("");

/* ============================================================ OPEN STORE */
function openStore() {
  const ub=unlockedBrands();
  const buyTotalCost=totalStagedCost(), payRent=state.level>=2&&state.staged.payRent;
  const adsByBrand={}; let adSpend=0;
  if(state.level>=2) { ub.forEach(b=>{ adsByBrand[b.id]=!!(state.staged.adsByBrand&&state.staged.adsByBrand[b.id]); if(adsByBrand[b.id])adSpend+=AD_COST; }); }
  const billsTotal=(payRent?RENT:0)+adSpend;
  const loanRepay=Math.min(state.staged.loanRepay||0, state.loan);
  if(buyTotalCost+billsTotal+loanRepay>state.cash||totalShelfIfOpened()===0) return;

  // Snapshot equity BEFORE any deductions (for balance sheet delta)
  const invSnapshot=inventoryValueNow();
  const assetsBefore=state.cash+invSnapshot+(state.shelfOwned?50:0);
  const equityBefore=assetsBefore-state.loan;

  // Apply loan repayment first
  if(loanRepay>0){ state.loan=Math.max(0,state.loan-loanRepay); state.cash-=loanRepay; }

  const buyUnitsByBrand={};
  ub.forEach(b=>{ const qty=state.staged.buy[b.id]||0; buyUnitsByBrand[b.id]=qty; if(qty>0){ const bef=state.inventory[b.id]; const nu=bef.units+qty; state.inventory[b.id]={units:nu,costEach:nu>0?(bef.units*bef.costEach+qty*b.cost)/nu:0}; } });
  state.cash-=(buyTotalCost+billsTotal);
  const prices={}; ub.forEach(b=>{ prices[b.id]=state.staged.prices[b.id]; });
  const {popularity:dailyPopularity,adBoostPct}=computeDailyPopularity(ub,adsByBrand);
  state.currentDay={buyTotalCost,buyUnitsByBrand,prices,payRent,adsByBrand,adSpend,billsTotal,loanRepay,assetsBefore,equityBefore,dailyPopularity,adBoostPct};
  BRANDS.forEach(b=>{state.staged.buy[b.id]=0;}); state.staged.buy[state.customBrand.id]=0;
  ub.forEach(b=>{if(state.staged.adsByBrand)state.staged.adsByBrand[b.id]=false;});
  state.staged.loanRepay=0;
  state.screen="simulating"; render();
}

/* ============================================================ SIMULATION */
function buildVisitors(ub, dayPlan) {
  let count=5+Math.floor(Math.random()*4);
  const numAds=Object.values(dayPlan.adsByBrand||{}).filter(Boolean).length;
  if(numAds>0) count+=numAds+Math.floor(Math.random()*numAds*2);
  if(state.competition.active&&state.competition.strength>0) {
    const loss=Math.ceil(count*state.competition.strength);
    count=Math.max(1,count-loss);
  }
  const popMap=dayPlan.dailyPopularity||{};
  const totalW=ub.reduce((s,b)=>s+(popMap[b.id]||b.basePopularity),0);
  return Array.from({length:count},()=>{
    let r=Math.random()*totalW, chosen=ub[ub.length-1];
    for(const b of ub){const p=popMap[b.id]||b.basePopularity;if(r<p){chosen=b;break;}r-=p;}
    return {brand:chosen,willingness:Math.round(chosen.minPrice-5+Math.random()*(chosen.maxPrice-chosen.minPrice+15)),wantsQty:Math.random()<chosen.bulkChance?2:1};
  });
}
function simulateOutcomes(visitors,prices,inv0) {
  const inv={}; for(const id in inv0)inv[id]=inv0[id].units;
  let unitsSold=0,revenue=0,cogs=0; const perBrandSold={},events=[];
  for(const v of visitors){
    const b=v.brand; const avail=inv[b.id]||0;
    if(avail<=0){events.push({type:"unavailable",brand:b});continue;}
    if((prices[b.id]||0)>v.willingness){events.push({type:"tooexpensive",brand:b});continue;}
    const qty=Math.min(v.wantsQty,avail); inv[b.id]-=qty; unitsSold+=qty; revenue+=qty*prices[b.id]; cogs+=qty*inv0[b.id].costEach;
    perBrandSold[b.id]=(perBrandSold[b.id]||0)+qty; events.push({type:"bought",brand:b,qty});
  }
  return {events,unitsSold,revenue,cogs,endInventory:inv,perBrandSold};
}
function simulationScreen() {
  const wrap=document.createElement("div"); const panel=document.createElement("div"); panel.className="panel";
  panel.innerHTML=`<div class="sim-header"><h2 style="margin:0;">🛎️ Day ${state.day} is open!</h2>
    <button class="btn-gray" id="skipBtn">⏩ Skip to results</button></div>
    <p class="sub">${state.competition.active?`⚔️ Sneak Peak is stealing customers today — ${Math.round(state.competition.strength*100)}% fewer visitors!`:"Watch who stops by today…"}</p>
    ${storefrontHTML("simShelf",b=>state.inventory[b.id].units)}
    <div class="sim-stats"><div class="stat-pill cash">💵 <span id="simCash">${fmt(state.cash)}</span></div><div class="stat-pill">👟 Sold: <span id="simSold">0</span></div></div>
    <div class="sidewalk" id="sw"><span class="sidewalk-empty">Customers are on their way…</span></div>`;
  wrap.appendChild(panel); setTimeout(()=>startSimulation(),150); return wrap;

function startSimulation() {
  const dp=state.currentDay, ub=unlockedBrands();
  const visitors=buildVisitors(ub,dp), sim=simulateOutcomes(visitors,dp.prices,state.inventory);
  let idx=0,runCash=state.cash,runSold=0; const runInv={};
  ub.forEach(b=>{runInv[b.id]=state.inventory[b.id].units;});
  const sw=document.getElementById("sw"),soldEl=document.getElementById("simSold"),cashEl=document.getElementById("simCash"),skipBtn=document.getElementById("skipBtn");
  const ids=[]; if(sw)sw.innerHTML="";
  const done=()=>{ ids.forEach(clearTimeout); finalizeDay(dp,sim); };
  if(skipBtn)skipBtn.onclick=done;
  function step(){
    if(idx>=sim.events.length){done();return;}
    const ev=sim.events[idx++];
    const ce=document.createElement("div"); ce.className="customer";
    ce.innerHTML=`<div class="bubble"></div><div class="cust-head" style="background:${ev.brand.color}"></div><div class="cust-body" style="background:${ev.brand.color}"></div>`;
    if(sw)sw.appendChild(ce);
    ids.push(setTimeout(()=>{
      const bub=ce.querySelector(".bubble");
      if(ev.type==="bought"){bub.textContent=ev.qty>1?`${ev.qty}×${ev.brand.short}!`:`${ev.brand.short}!`;bub.classList.add("happy");ce.classList.add("bought");runInv[ev.brand.id]-=ev.qty;runCash+=ev.qty*dp.prices[ev.brand.id];runSold+=ev.qty;}
      else if(ev.type==="tooexpensive"){bub.textContent=`${ev.brand.short}? Too pricey!`;bub.classList.add("sad");}
      else{bub.textContent=`No ${ev.brand.short}!`;bub.classList.add("sad");}
      bub.classList.add("show");
      if(cashEl)cashEl.textContent=fmt(runCash); if(soldEl)soldEl.textContent=runSold;
      const si=document.getElementById("simShelf"); if(si)si.innerHTML=shelfIconsHTML(b=>runInv[b.id]||0);
    },280));
    ids.push(setTimeout(()=>ce.classList.add("leaving"),830));
    ids.push(setTimeout(()=>{ce.remove();step();},1150));
  }
  step();
}

/* ============================================================ FINALIZE DAY */
function finalizeDay(dayPlan, sim) {
  // assetsBefore/equityBefore were captured in openStore BEFORE any deductions
  const {assetsBefore, equityBefore} = dayPlan;
  const grossProfit=sim.revenue-sim.cogs, netProfit=grossProfit-dayPlan.billsTotal;
  state.cash+=sim.revenue;
  for(const id in sim.endInventory){if(state.inventory[id])state.inventory[id].units=sim.endInventory[id];}
  const invAfter=inventoryValueNow(), assetsAfter=state.cash+invAfter+(state.shelfOwned?50:0), equityAfter=assetsAfter-state.loan;
  state.history.push({
    day:state.day,buyTotalCost:dayPlan.buyTotalCost,prices:dayPlan.prices,
    unitsSold:sim.unitsSold,revenue:sim.revenue,cogs:sim.cogs,grossProfit,
    rent:dayPlan.payRent?RENT:0,adSpend:dayPlan.adSpend||0,billsTotal:dayPlan.billsTotal,
    adsByBrand:dayPlan.adsByBrand||{},adBoostPct:dayPlan.adBoostPct||{},
    loanRepay:dayPlan.loanRepay||0,loanBalance:state.loan,
    netProfit,cashEnd:state.cash,perBrandSold:sim.perBrandSold,
    assetsBefore,assetsAfter,equityBefore,equityAfter,equityDelta:equityAfter-equityBefore,
    competitionActive:state.competition.active,competitionStrength:state.competition.strength
  });

  // Rent eviction check
  if(state.level>=2) {
    if(!dayPlan.payRent) {
      state.missedRentStreak=(state.missedRentStreak||0)+1;
      if(state.missedRentStreak>=2) {
        state.message={type:"evicted"};
        state.screen="evicted"; render(); return;
      }
    } else {
      state.missedRentStreak=0;
    }
  }

  state.currentQuiz={type:pickQuizType(),submitted:false,userAnswer:null,correct:null,correctAnswer:null};
  state.screen="quiz"; render();
}

/* ============================================================ LEVEL UP */
function checkLevelUp(){
  const m={
    2:{day:4,badge:"First Profit Pro",text:`You survived your first days! Real stores have fixed bills — you can now pay rent and run brand-specific ads. You've also unlocked <b>Zenith Court</b> — higher cost, bigger margin!`},
    3:{day:7,badge:"Cash Detective",text:`PROFIT and CASH are not the same thing! You've also unlocked <b>Phantom Fly</b> — premium sneakers at $65/pair. Huge upside, but buying a few pairs ties up serious cash if they sit.`},
    4:{day:10,badge:"Balance Sheet Boss",text:`Time to see the BIG picture: everything you OWN (assets) vs. everything you OWE (liabilities). The difference is your <b>equity</b> — what's truly yours. If you've taken a loan, watch how it shrinks your equity!`},
    5:{day:13,badge:"Valuation Wizard",text:`An investor wants to buy ${getStoreName()}! Before you decide, you'll calculate what your store is actually worth using the 18×–30× monthly profit formula.`}
  };
  for(const lvl of Object.keys(m)){

    if(state.day===ms.day&&state.level<parseInt(lvl)){
      state.level=parseInt(lvl); if(!state.badges.includes(ms.badge))state.badges.push(ms.badge);
      state.message={type:"levelup",level:lvl,badge:ms.badge,text:ms.text}; break;
    }
  }
}

/* ============================================================ COMPETITION */
function checkCompetition(){
  // Trigger on Day 6
  if(state.day===6&&!state.competition.active){
    state.competition={active:true,startDay:6,strength:0.40,profitStreak:0};
    if(!state.message) state.message={type:"competition"};
    return;
  }
  // Recovery tracking
  if(state.competition.active&&state.competition.strength>0.05){
    const last=state.history[state.history.length-1];
    if(last&&last.netProfit>0){
      state.competition.profitStreak=(state.competition.profitStreak||0)+1;
    } else {
      state.competition.profitStreak=0;
    }
    if(state.competition.profitStreak>=3){
      state.competition.strength=Math.max(0,state.competition.strength-0.30);
      state.competition.profitStreak=0;
      if(!state.badges.includes("Competition Crusher"))state.badges.push("Competition Crusher");
      if(!state.message) state.message={type:"recovery",fullyGone:state.competition.strength<=0.05};
    }
  }
}

/* ============================================================ HISTORY CHARTS */
function makeBarChartSVG(series,labels,opts){
  const W=500,H=160,PL=46,PR=10,PT=14,PB=26,CW=W-PL-PR,CH=H-PT-PB,n=labels.length;
  if(!n)return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:160px;display:block;"></svg>`;
  const allV=series.flatMap(s=>s.values),maxV=Math.max(...allV.map(Math.abs),1),nS=series.length;
  const gW=CW/n,bW=Math.min(Math.max(gW*0.7/nS-2,3),22),fY=opts&&opts.formatY?opts.formatY:v=>`${Math.round(v)}`;
  let svg="";
  [0,0.25,0.5,0.75,1].forEach(f=>{const y=PT+CH*(1-f);svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#F0F0F0" stroke-width="1"/>`;svg+=`<text x="${PL-4}" y="${y+3}" text-anchor="end" font-size="8" fill="#aaa" font-family="sans-serif">${fY(maxV*f)}</text>`;});
  svg+=`<line x1="${PL}" y1="${PT+CH}" x2="${W-PR}" y2="${PT+CH}" stroke="#ccc" stroke-width="1.5"/>`;
  svg+=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+CH}" stroke="#ccc" stroke-width="1.5"/>`;
  labels.forEach((lbl,i)=>{
    const cx=PL+i*gW+gW/2,tW=nS*bW+(nS-1)*2,sx=cx-tW/2;
    series.forEach((s,si)=>{const v=s.values[i],bh=(Math.abs(v)/maxV)*CH,bx=sx+si*(bW+2),by=v>=0?PT+CH-bh:PT+CH,col=v>=0?(s.color||"#5B8DEF"):(s.negColor||s.color||"#E2645A");svg+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bW}" height="${Math.max(bh,0.5).toFixed(1)}" fill="${col}" rx="2" opacity="0.9"/>`;});
    svg+=`<text x="${cx}" y="${H-5}" text-anchor="middle" font-size="8" fill="#8a8474" font-family="sans-serif">${lbl}</text>`;
  });
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:165px;display:block;">${svg}</svg>`;
}
function historyChartView(){
  const d=document.createElement("div"),h=state.history;
  if(!h.length){d.innerHTML=`<p class="sub">Complete your first day to see history!</p>`;return d;}
  const ub=unlockedBrands(),labels=h.map(r=>`D${r.day}`);
  const incChart=makeBarChartSVG([{label:"Revenue",values:h.map(r=>r.revenue),color:"#5B8DEF"},{label:"Net Profit",values:h.map(r=>r.netProfit),color:"#4CAF50",negColor:"#E2645A"}],labels,{formatY:v=>`$${Math.round(v)}`});
  const brandChart=makeBarChartSVG(ub.map(b=>({label:b.short,values:h.map(r=>(r.perBrandSold&&r.perBrandSold[b.id])||0),color:b.color})),labels,{formatY:v=>`${Math.round(v)}`});
  const W=500,H=140,PL=46,PR=10,PT=14,PB=26,CW=W-PL-PR,CH=H-PT-PB,n=labels.length;
  let psvg="";
  if(n>0){
    const allP=ub.flatMap(b=>h.map(r=>r.prices&&r.prices[b.id]?r.prices[b.id]:0)).filter(v=>v>0),maxP=Math.max(...allP,1),gW=CW/n;
    [0,0.25,0.5,0.75,1].forEach(f=>{const y=PT+CH*(1-f);psvg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#F0F0F0" stroke-width="1"/>`;psvg+=`<text x="${PL-4}" y="${y+3}" text-anchor="end" font-size="8" fill="#aaa" font-family="sans-serif">$${Math.round(maxP*f)}</text>`;});
    psvg+=`<line x1="${PL}" y1="${PT+CH}" x2="${W-PR}" y2="${PT+CH}" stroke="#ccc" stroke-width="1.5"/>`;
    psvg+=`<line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+CH}" stroke="#ccc" stroke-width="1.5"/>`;
    ub.forEach(b=>{
      const pts=h.map((r,i)=>{const p=r.prices&&r.prices[b.id]?r.prices[b.id]:null;if(!p)return null;return`${(PL+i*gW+gW/2).toFixed(1)},${(PT+CH-(p/maxP)*CH).toFixed(1)}`;}).filter(Boolean);
      if(pts.length>1)psvg+=`<polyline points="${pts.join(" ")}" fill="none" stroke="${b.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
      h.forEach((r,i)=>{const p=r.prices&&r.prices[b.id]?r.prices[b.id]:null;if(!p)return;const cx=(PL+i*gW+gW/2),cy=PT+CH-(p/maxP)*CH;psvg+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.5" fill="${b.color}" stroke="#fff" stroke-width="1.5"/>`;psvg+=`<text x="${cx}" y="${cy-7}" text-anchor="middle" font-size="7.5" fill="${b.color}" font-weight="bold" font-family="sans-serif">$${p}</text>`;});
      h.forEach((r,i)=>{const cx=PL+i*gW+gW/2;psvg+=`<text x="${cx}" y="${H-5}" text-anchor="middle" font-size="8" fill="#8a8474" font-family="sans-serif">${labels[i]}</text>`;});
    });
  }
  const tableRows=h.map(r=>`<tr><td class="day-col">Day ${r.day}</td>${ub.map(b=>{const qty=r.perBrandSold&&r.perBrandSold[b.id]?r.perBrandSold[b.id]:0,p=r.prices&&r.prices[b.id]?fmt(r.prices[b.id]):"—",ad=r.adsByBrand&&r.adsByBrand[b.id];return`<td style="text-align:center;color:${qty>0?b.color:"#aaa"};">${qty>0?`${qty}@${p}${ad?" 📣":""}`:""}</td>`;}).join("")}</tr>`).join("");
  d.innerHTML=`<p class="sub">Day-by-day performance across all key metrics for ${getStoreName()}.</p>
    <div class="hist-chart-wrap"><p class="hist-chart-title">💹 Revenue vs. Net Profit</p>${incChart}<div class="bs-legend"><span><i class="dot" style="background:#5B8DEF;"></i>Revenue</span><span><i class="dot" style="background:#4CAF50;"></i>Net Profit</span><span><i class="dot" style="background:#E2645A;"></i>Net Loss</span></div></div>
    <div class="hist-chart-wrap"><p class="hist-chart-title">👟 Units Sold by Brand</p>${brandChart}<div class="bs-legend">${ub.map(b=>`<span><i class="dot" style="background:${b.color};"></i>${b.short}</span>`).join("")}</div></div>
    <div class="hist-chart-wrap"><p class="hist-chart-title">💲 Price by Brand</p><svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:145px;display:block;">${psvg}</svg><div class="bs-legend">${ub.map(b=>`<span><i class="dot" style="background:${b.color};"></i>${b.short}</span>`).join("")}</div></div>
    <div class="hist-chart-wrap"><p class="hist-chart-title">📋 Qty Sold &amp; Price by Brand</p><div class="hist-table-wrap"><table class="hist-table"><thead><tr><th style="text-align:left;">Day</th>${ub.map(b=>`<th style="color:${b.color};">${b.name}</th>`).join("")}</tr></thead><tbody>${tableRows}</tbody></table></div></div>`;
  return d;
}

/* ============================================================ INVEST SCREEN (with calculation quiz) */
function investScreen(){
  const wrap=document.createElement("div"),panel=document.createElement("div"); panel.className="panel";
  const recent=state.history.slice(-5);
  const avgDaily=recent.reduce((s,r)=>s+r.netProfit,0)/Math.max(1,recent.length);

  if(!state.investCalc){
    const monthly=Math.round(avgDaily*20);
    const offer=Math.round(monthly*(18+Math.random()*12));
    state.investCalc={avgDaily:Math.round(avgDaily),monthly,fairLow:Math.round(monthly*18),fairHigh:Math.round(monthly*30),offer,step:0,answers:{}};
  }
  const ic=state.investCalc, step=ic.step;

  if(step===0){
    panel.innerHTML=`<h2>🤝 Investor alert!</h2>
      <p class="sub">Someone wants to buy ${getStoreName()}! Before you decide, you need to figure out what it's <em>actually worth</em> first.</p>
      <div class="calc-box">
        <p class="sub" style="margin-bottom:6px;"><b>Step 1 of 3:</b> Calculate your monthly profit</p>
        <p class="sub">Your recent average daily profit: <b>${fmt(ic.avgDaily)}</b></p>
        <p class="sub">A month has about <b>20</b> selling days.</p>
        <p class="calc-formula">${fmt(ic.avgDaily)} × 20 = ?</p>
        <p class="sub" style="font-weight:800;">What's your estimated monthly profit?</p>
        <div style="display:flex;align-items:center;gap:10px;margin-top:8px;"><span style="font-size:22px;font-weight:900;">$</span><input type="number" id="invI" class="quiz-input" placeholder="0" ${ic.answers[0]!==undefined?"disabled":""}></div>
      </div>`;
    if(ic.answers[0]===undefined){
      const cb=document.createElement("button");cb.className="btn-indigo btn-big";cb.style.marginTop="12px";cb.textContent="Submit →";
      cb.onclick=()=>{const el=document.getElementById("invI");const v=el?Number(el.value):0;ic.answers[0]=v;const ok=Math.abs(v-ic.monthly)<=Math.max(ic.monthly*0.1,20);ic.answers["0_ok"]=ok;render();};
      panel.appendChild(cb);
    } else {
      const ok=ic.answers["0_ok"];
      const fb=document.createElement("div");fb.className="explainer "+(ok?"good":"warn");
      fb.innerHTML=ok?`🎉 Correct! Monthly profit ≈ <b>${fmt(ic.monthly)}</b>`:`The answer is <b>${fmt(ic.monthly)}</b> (${fmt(ic.avgDaily)} × 20).`;
      panel.appendChild(fb);
      const nb=document.createElement("button");nb.className="btn-indigo btn-big";nb.style.marginTop="12px";nb.textContent="Step 2 →";nb.onclick=()=>{ic.step=1;render();};
      panel.appendChild(nb);
    }
  }
  else if(step===1){
    panel.innerHTML=`<h2>🤝 What's it worth? (Low end)</h2>
      <div class="calc-box">
        <p class="sub"><b>Step 2 of 3:</b> Calculate the LOW end of fair value</p>
        <p class="sub">For micro businesses, fair value = <b>18×</b> to <b>30×</b> monthly profit.</p>
        <p class="sub">Monthly profit: <b>${fmt(ic.monthly)}</b></p>
        <p class="calc-formula">${fmt(ic.monthly)} × 18 = ?</p>
        <p class="sub" style="font-weight:800;">What is the LOW end of fair value?</p>
        <div style="display:flex;align-items:center;gap:10px;margin-top:8px;"><span style="font-size:22px;font-weight:900;">$</span><input type="number" id="invI" class="quiz-input" placeholder="0" ${ic.answers[1]!==undefined?"disabled":""}></div>
      </div>`;
    if(ic.answers[1]===undefined){
      const cb=document.createElement("button");cb.className="btn-indigo btn-big";cb.style.marginTop="12px";cb.textContent="Submit →";
      cb.onclick=()=>{const el=document.getElementById("invI");const v=el?Number(el.value):0;ic.answers[1]=v;const ok=Math.abs(v-ic.fairLow)<=Math.max(ic.fairLow*0.1,50);ic.answers["1_ok"]=ok;render();};
      panel.appendChild(cb);
    } else {
      const ok=ic.answers["1_ok"];
      const fb=document.createElement("div");fb.className="explainer "+(ok?"good":"warn");
      fb.innerHTML=ok?`🎉 Right! Low end ≈ <b>${fmt(ic.fairLow)}</b>`:`The answer is <b>${fmt(ic.fairLow)}</b> (${fmt(ic.monthly)} × 18).`;
      panel.appendChild(fb);
      const nb=document.createElement("button");nb.className="btn-indigo btn-big";nb.style.marginTop="12px";nb.textContent="Step 3 →";nb.onclick=()=>{ic.step=2;render();};
      panel.appendChild(nb);
    }
  }
  else if(step===2){
    panel.innerHTML=`<h2>🤝 What's it worth? (High end)</h2>
      <div class="calc-box">
        <p class="sub"><b>Step 3 of 3:</b> Calculate the HIGH end of fair value</p>
        <p class="sub">Monthly profit: <b>${fmt(ic.monthly)}</b></p>
        <p class="calc-formula">${fmt(ic.monthly)} × 30 = ?</p>
        <p class="sub" style="font-weight:800;">What is the HIGH end of fair value?</p>
        <div style="display:flex;align-items:center;gap:10px;margin-top:8px;"><span style="font-size:22px;font-weight:900;">$</span><input type="number" id="invI" class="quiz-input" placeholder="0" ${ic.answers[2]!==undefined?"disabled":""}></div>
      </div>`;
    if(ic.answers[2]===undefined){
      const cb=document.createElement("button");cb.className="btn-indigo btn-big";cb.style.marginTop="12px";cb.textContent="Submit →";
      cb.onclick=()=>{const el=document.getElementById("invI");const v=el?Number(el.value):0;ic.answers[2]=v;const ok=Math.abs(v-ic.fairHigh)<=Math.max(ic.fairHigh*0.1,50);ic.answers["2_ok"]=ok;render();};
      panel.appendChild(cb);
    } else {
      const ok=ic.answers["2_ok"];
      const fb=document.createElement("div");fb.className="explainer "+(ok?"good":"warn");
      fb.innerHTML=ok?`🎉 Exactly! High end ≈ <b>${fmt(ic.fairHigh)}</b>`:`The answer is <b>${fmt(ic.fairHigh)}</b> (${fmt(ic.monthly)} × 30).`;
      panel.appendChild(fb);
      const nb=document.createElement("button");nb.className="btn-indigo btn-big";nb.style.marginTop="12px";nb.textContent="See the offer! →";nb.onclick=()=>{ic.step=3;render();};
      panel.appendChild(nb);
    }
  }
  else { // step 3: the offer
    const verdict=ic.offer>=ic.fairLow&&ic.offer<=ic.fairHigh?"within":"above";
    const offerClass=ic.offer<ic.fairLow?"❌ Below fair value":ic.offer>ic.fairHigh?"🔥 Above fair value!":"✅ Within fair range";
    panel.innerHTML=`<h2>💼 The Offer</h2>
      <p class="sub">You calculated: Fair value range = <b>${fmt(ic.fairLow)} – ${fmt(ic.fairHigh)}</b></p>
      <div class="calc-box" style="text-align:center;">
        <p style="font-size:15px;font-weight:800;color:#6b6359;">The investor is offering:</p>
        <div class="invest-big">${fmt(ic.offer)}</div>
        <p style="font-size:16px;font-weight:900;">${offerClass}</p>
      </div>
      <p class="sub" style="margin-top:10px;">Is ${fmt(ic.offer)} a good deal for ${getStoreName()}?</p>`;
    const row=document.createElement("div");row.className="row";
    const sellBtn=document.createElement("button");sellBtn.className="btn-green";sellBtn.textContent="🤝 Take the deal!";sellBtn.onclick=()=>resolveInvest(true);
    const keepBtn=document.createElement("button");keepBtn.className="btn-primary";keepBtn.textContent="🙅 No thanks, keep it";keepBtn.onclick=()=>resolveInvest(false);
    row.appendChild(sellBtn);row.appendChild(keepBtn);panel.appendChild(row);
  }
  wrap.appendChild(panel); return wrap;
}
function resolveInvest(accepted){
  const ic=state.investCalc;
  const offer=ic.offer,lo=ic.fairLow,hi=ic.fairHigh;
  let verdict;
  if(accepted){ state.cash+=offer; verdict=offer>=lo?`Great move! ${fmt(offer)} is a fair or generous price for a store earning what yours does!`:`Hmm — that offer (${fmt(offer)}) was BELOW fair value (${fmt(lo)}–${fmt(hi)}). You sold for less than it was worth!`; }
  else { verdict=offer<lo?`Smart! That offer was below fair value (${fmt(lo)}–${fmt(hi)}). Good instinct to hold out!`:`The offer of ${fmt(offer)} was actually ${offer>hi?"above":"within"} the fair range (${fmt(lo)}–${fmt(hi)}). But keeping a growing business is always a valid choice!`; }
  state.message={type:"invest_result",text:verdict,accepted};
  render();
}

/* ============================================================ EVICTED */
function evictedScreen(){
  const wrap=document.createElement("div"),panel=document.createElement("div"); panel.className="panel";
  panel.innerHTML=`<div class="big-emoji">🔒</div>
    <h2 style="text-align:center;color:#B3261E;">Evicted!</h2>
    <p class="sub" style="text-align:center;">You missed rent 2 days in a row. The landlord locked you out of <b>${getStoreName()}</b>.</p>
    <div class="explainer danger" style="margin-top:14px;"><b>Real business lesson:</b> Fixed costs like rent must be paid even when sales are slow. Smart owners always keep enough cash reserved to cover at least 1–2 months of fixed expenses — this is called a <b>cash reserve</b>.</div>`;
  wrap.appendChild(panel);
  const rb=document.createElement("button");rb.className="btn-indigo btn-big";rb.textContent="🔁 Start over";rb.onclick=()=>{state=freshState();render();};
  wrap.appendChild(rb);return wrap;
}

/* ============================================================ END SCREEN */
function endScreen(){
  const wrap=document.createElement("div"),panel=document.createElement("div"); panel.className="panel";
  panel.innerHTML=`<div class="big-emoji">🏆</div><h2>You completed ${GAME_TITLE}!</h2><p class="sub">Here's everything you learned to read like a real business owner, ${state.playerName}:</p>`;
  const br=document.createElement("div");br.className="badge-row";state.badges.forEach(b=>{const el=document.createElement("div");el.className="badge";el.textContent="🏅 "+b;br.appendChild(el);});
  panel.appendChild(br);wrap.appendChild(panel);
  const rb=document.createElement("button");rb.className="btn-indigo btn-big";rb.textContent="🔁 Play again";rb.onclick=()=>{state=freshState();render();};
  wrap.appendChild(rb);return wrap;
}

/* ============================================================ MODAL */
function modal(msg){
  const bg=document.createElement("div");bg.className="modal-bg";
  const box=document.createElement("div");box.className="modal";
  if(msg.type==="levelup"){
    box.innerHTML=`<div class="big-emoji">🎉</div><h2>Level ${msg.level} unlocked!</h2><p style="font-size:16px;line-height:1.5;margin:10px 0;">${msg.text}</p><div class="badge-row"><div class="badge">🏅 ${msg.badge}</div></div>`;
  } else if(msg.type==="competition"){
    box.innerHTML=`<div class="big-emoji">⚔️</div>
      <h2 style="color:#B3261E;">New Competition!</h2>
      <p style="font-size:16px;line-height:1.5;margin:10px 0;">A slick new store called <b>Sneak Peak</b> just opened two doors down! They're running sales, drawing in customers, and cutting into your foot traffic by <b>~40%</b> each day.</p>
      <p style="font-size:15px;line-height:1.5;margin:10px 0;font-weight:800;">Your mission: fight back and get back on even footing! Run brand ads, keep prices competitive, and earn 3 profitable days in a row to weaken their hold.</p>
      <div class="explainer danger">Every real business faces competition eventually. How you respond defines whether you survive!</div>`;
  } else if(msg.type==="recovery"){
    const fullyGone=msg.fullyGone;
    box.innerHTML=`<div class="big-emoji">${fullyGone?"🏆":"💪"}</div>
      <h2 style="color:#1B5E20;">${fullyGone?"Competition Crushed!":"You're Fighting Back!"}</h2>
      <p style="font-size:16px;line-height:1.5;margin:10px 0;">${fullyGone?"Sneak Peak has backed off! Your store's reputation proved too strong — customers are coming back in full force. You earned the <b>Competition Crusher</b> badge!":"You've earned 3 profitable days under pressure! Sneak Peak is starting to lose steam. Keep it up — one more streak and you'll push them out for good!"}</p>
      <div class="badge-row"><div class="badge">🏅 Competition Crusher</div></div>`;
  } else if(msg.type==="evicted"){
    box.innerHTML=`<div class="big-emoji">🔒</div><h2 style="color:#B3261E;">Evicted!</h2><p style="font-size:16px;margin:10px 0;">Two consecutive missed rent payments — the landlord has locked up your store.</p>`;
    const rb=document.createElement("button");rb.className="btn-indigo btn-big";rb.style.marginTop="12px";rb.textContent="See what happened";
    rb.onclick=()=>{state.message=null;render();}; box.appendChild(rb); bg.appendChild(box); return bg;
  } else if(msg.type==="invest_result"){
    box.innerHTML=`<div class="big-emoji">${msg.accepted?"🤝":"🏪"}</div><h2>${msg.accepted?"Deal closed!":"You kept your store!"}</h2><p style="font-size:16px;line-height:1.5;margin:10px 0;">${msg.text}</p>`;
  }
  const closeBtn=document.createElement("button");closeBtn.className="btn-indigo btn-big";closeBtn.style.marginTop="16px";closeBtn.textContent="Continue →";
  closeBtn.onclick=()=>{
    const t=state.message?state.message.type:null; state.message=null;
    if(t==="levelup"&&state.level===5){state.screen="invest";}
    else if(t==="invest_result"){state.screen="end";}
    else{state.screen="day";}
    render();
  };
  box.appendChild(closeBtn);bg.appendChild(box);return bg;
}

render();
</script>
